<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Danke · Kaiser-Webdesign</title>
  <link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml">
  <style>
    body{margin:0;min-height:100vh;background:#020405;color:#f7fff4;font-family:system-ui,-apple-system,Segoe UI,sans-serif;display:grid;place-items:center;overflow:hidden}
    body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 70% 40%,rgba(152,255,54,.18),transparent 28%),radial-gradient(circle at 35% 70%,rgba(54,234,255,.12),transparent 32%),#020405}
    main{position:relative;width:min(760px,90vw);padding:52px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.035);backdrop-filter:blur(18px)}
    .mark{width:48px;height:48px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.24);box-shadow:0 0 30px rgba(152,255,54,.20)}
    h1{font-family:Impact,Arial Narrow,sans-serif;font-size:clamp(48px,8vw,96px);line-height:.9;letter-spacing:.03em;text-transform:uppercase;margin:34px 0 20px}
    p{color:rgba(255,255,255,.68);line-height:1.7;font-size:18px}
    a{display:inline-flex;margin-top:26px;background:#98ff36;color:#020405;padding:16px 22px;text-decoration:none;text-transform:uppercase;letter-spacing:.16em;font-size:12px;font-weight:800}
  </style>
</head>
<body>
  <main>
    <div class="mark">K</div>
    <h1>Danke.<br>Deine Anfrage ist angekommen.</h1>
    <p>Ich melde mich schnellstmöglich bei dir und schaue mir dein Projekt sauber an.</p>
    <a href="../">Zurück zur Website</a>
  </main>
</body>
</html>
